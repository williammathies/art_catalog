name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

  deploy:
    # Only deploy on a push to main — never on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test          # tests must pass before deploying
    runs-on: self-hosted # runs on the OptiPlex runner agent

    steps:
      - name: Deploy to local server
        run: bash /home/williammathies/apps/art-catalog/deploy.sh
